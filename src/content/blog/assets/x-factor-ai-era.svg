<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI 時代的 X Factor 封面圖</title>
  <desc id="desc">左側代表人類直覺與判斷，右側代表 AI 計算與自動化，中間匯流成個人獨特價值。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1022"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0.28" cy="0.45" r="0.45">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="0.72" cy="0.45" r="0.45">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#leftGlow)"/>
  <rect width="1600" height="900" fill="url(#rightGlow)"/>

  <!-- left side: human / intuition -->
  <circle cx="430" cy="300" r="80" fill="#fb7185" fill-opacity="0.15" stroke="#fb7185" stroke-opacity="0.7" stroke-width="3"/>
  <circle cx="380" cy="430" r="44" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b" stroke-opacity="0.75" stroke-width="2.5"/>
  <circle cx="500" cy="470" r="28" fill="#fda4af" fill-opacity="0.2" stroke="#fda4af" stroke-opacity="0.75" stroke-width="2"/>
  <line x1="430" y1="300" x2="380" y2="430" stroke="#fb7185" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="430" y1="300" x2="500" y2="470" stroke="#f59e0b" stroke-width="3" stroke-opacity="0.7"/>

  <!-- right side: ai / computation -->
  <rect x="1050" y="240" width="120" height="120" rx="20" fill="#22d3ee" fill-opacity="0.16" stroke="#22d3ee" stroke-opacity="0.8" stroke-width="3"/>
  <rect x="980" y="420" width="90" height="90" rx="16" fill="#38bdf8" fill-opacity="0.16" stroke="#38bdf8" stroke-opacity="0.8" stroke-width="2.5"/>
  <rect x="1160" y="430" width="110" height="110" rx="18" fill="#67e8f9" fill-opacity="0.16" stroke="#67e8f9" stroke-opacity="0.8" stroke-width="2.5"/>
  <line x1="1110" y1="300" x2="1025" y2="465" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.75"/>
  <line x1="1110" y1="300" x2="1215" y2="485" stroke="#38bdf8" stroke-width="3" stroke-opacity="0.75"/>

  <!-- convergence path -->
  <path d="M530 640 C 700 540, 900 540, 1070 640" fill="none" stroke="url(#path)" stroke-width="10" stroke-linecap="round"/>

  <!-- center symbol: x factor -->
  <circle cx="800" cy="540" r="96" fill="#0b1229" stroke="url(#path)" stroke-width="4"/>
  <line x1="760" y1="500" x2="840" y2="580" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
  <line x1="840" y1="500" x2="760" y2="580" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>

  <!-- subtle grid -->
  <g stroke="#94a3b8" stroke-opacity="0.08">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
</svg>
